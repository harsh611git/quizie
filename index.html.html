<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Navigation Quiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 600px; }
        .hidden { display: none; }
        
        .timer-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-family: monospace; background: #333; color: #fff; padding: 10px; border-radius: 8px; }
        .q-timer { color: #4fc3f7; }
        .g-timer { color: #81c784; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 20px 0; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-size: 16px; transition: 0.2s; }
        
        /* Option Buttons */
        .option-btn { background: #fff; border: 2px solid #ddd; text-align: left; padding-left: 20px; }
        .option-btn:hover { border-color: #007bff; background: #f8fbff; }
        .option-btn.selected { background: #007bff; color: white; border-color: #0056b3; }
        
        /* Nav Buttons */
        .nav-controls { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
        .prev-btn { background: #6c757d; color: white; width: 48%; }
        .next-btn { background: #28a745; color: white; width: 48%; }
        .next-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .report-table th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="card">
    <!-- SCREEN 1: SETUP -->
    <div id="setup-screen">
        <h2>Quiz Setup</h2>
        <p>Number of Questions:</p>
        <input type="number" id="num-input" value="5" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc;">
        <button onclick="startQuiz()" style="width:100%; background:#007bff; color:white;">Start Test</button>
    </div>

    <!-- SCREEN 2: QUIZ -->
    <div id="quiz-screen" class="hidden">
        <div class="timer-bar">
            <span class="q-timer">Current Q: <span id="q-clock">0</span>s</span>
            <span class="g-timer">Total: <span id="g-clock">00:00</span></span>
        </div>
        
        <h3 id="progress-text">Question 1</h3>
        <p id="question-text">Please select an option below:</p>

        <div class="options-grid">
            <button class="option-btn" id="opt-A" onclick="selectOption('A')">A. Option A</button>
            <button class="option-btn" id="opt-B" onclick="selectOption('B')">B. Option B</button>
            <button class="option-btn" id="opt-C" onclick="selectOption('C')">C. Option C</button>
            <button class="option-btn" id="opt-D" onclick="selectOption('D')">D. Option D</button>
            <button class="option-btn" id="opt-E" onclick="selectOption('E')">E. Option E</button>
        </div>

        <div class="nav-controls">
            <button class="prev-btn" id="prev-btn" onclick="goBack()">Previous</button>
            <button class="next-btn" id="next-btn" onclick="goForward()">Next Question</button>
        </div>
    </div>

    <!-- SCREEN 3: REPORT -->
    <div id="report-screen" class="hidden">
        <h2>Final Report</h2>
        <p id="total-time-summary"></p>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Q#</th>
                    <th>Answer</th>
                    <th>Time Taken</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button onclick="location.reload()" style="width:100%; margin-top:20px; background:#333; color:white;">Restart</button>
    </div>
</div>

<script>
    let totalQuestions = 0;
    let currentIndex = 0;
    
    // Arrays to store data
    let userAnswers = [];
    let timePerQuestion = []; // Stores seconds spent on each question
    
    let globalSeconds = 0;
    let currentQSeconds = 0;
    let timerInterval;

    function startQuiz() {
        totalQuestions = parseInt(document.getElementById('num-input').value);
        userAnswers = Array(totalQuestions).fill("-");
        timePerQuestion = Array(totalQuestions).fill(0);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        runTimers();
        loadQuestion();
    }

    function runTimers() {
        timerInterval = setInterval(() => {
            globalSeconds++;
            currentQSeconds++;
            
            // Update Global Display
            let mins = Math.floor(globalSeconds / 60);
            let secs = globalSeconds % 60;
            document.getElementById('g-clock').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            
            // Update Current Q Display
            document.getElementById('q-clock').innerText = currentQSeconds;
        }, 1000);
    }

    function loadQuestion() {
        document.getElementById('progress-text').innerText = `Question ${currentIndex + 1} of ${totalQuestions}`;
        
        // Update Nav buttons
        document.getElementById('prev-btn').disabled = (currentIndex === 0);
        document.getElementById('next-btn').innerText = (currentIndex === totalQuestions - 1) ? "Finish Test" : "Next Question";

        // Refresh Button UI
        refreshOptionUI();
    }

    function selectOption(letter) {
        userAnswers[currentIndex] = letter;
        refreshOptionUI();
    }

    function refreshOptionUI() {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.classList.remove('selected'));
        
        if (userAnswers[currentIndex] !== "-") {
            document.getElementById(`opt-${userAnswers[currentIndex]}`).classList.add('selected');
        }
    }

    function goForward() {
        // Save the time spent on this question before moving
        timePerQuestion[currentIndex] += currentQSeconds;
        currentQSeconds = 0; // Reset question timer for the next one

        if (currentIndex < totalQuestions - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            finishTest();
        }
    }

    function goBack() {
        // Save time spent on current before moving back
        timePerQuestion[currentIndex] += currentQSeconds;
        currentQSeconds = 0;

        if (currentIndex > 0) {
            currentIndex--;
            loadQuestion();
        }
    }

    function finishTest() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');

        document.getElementById('total-time-summary').innerText = `Total Duration: ${document.getElementById('g-clock').innerText}`;

        let tableRows = "";
        userAnswers.forEach((ans, i) => {
            tableRows += `<tr>
                <td>${i + 1}</td>
                <td><strong>${ans}</strong></td>
                <td>${timePerQuestion[i]} seconds</td>
            </tr>`;
        });
        document.getElementById('report-body').innerHTML = tableRows;
    }
</script>

</body>
</html>
