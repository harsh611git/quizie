<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Response Tracker</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --dark: #1e293b; --gray: #64748b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 600px; min-height: 450px; display: flex; flex-direction: column; }
        .hidden { display: none; }
        
        h2 { color: var(--dark); text-align: center; margin-top: 0; }
        label { font-weight: 600; color: var(--gray); display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; margin-bottom: 25px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        
        .timer-bar { display: flex; justify-content: space-between; background: var(--dark); color: white; padding: 14px 20px; border-radius: 12px; margin-bottom: 30px; font-family: monospace; font-size: 1.1rem; }
        .q-display { font-size: 3.5rem; font-weight: 800; text-align: center; color: var(--primary); margin: 30px 0; }

        .options-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 40px; }
        .option-btn { background: white; border: 2px solid #f1f5f9; padding: 25px 0; border-radius: 12px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .nav-controls { display: flex; justify-content: space-between; margin-top: auto; padding-top: 25px; border-top: 2px solid #f1f5f9; }
        button.action { padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 45%; }
        .btn-start { background: var(--primary); color: white; width: 100% !important; }
        .btn-prev { background: #e2e8f0; color: var(--gray); }
        .btn-next { background: var(--success); color: white; }

        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .tag { font-weight: bold; padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; background: #f1f5f9; color: var(--gray); }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-screen">
        <h2>Assessment Portal</h2>
        <label>Test Identity:</label>
        <input type="text" id="test-name" placeholder="e.g. Zoology Quiz">
        <label>Number of Questions:</label>
        <input type="number" id="num-qs" value="5">
        <button class="btn-start action" onclick="initTest()">INITIALIZE TEST</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="timer-bar">
            <span>Q: <b id="q-clock" style="color:#fbbf24">0</b>s</span>
            <span>Total: <b id="g-clock">00:00</b></span>
        </div>
        <div class="q-display" id="q-number">Q1</div>
        <div class="options-grid">
            <button class="option-btn" onclick="record('A')" id="btn-A">A</button>
            <button class="option-btn" onclick="record('B')" id="btn-B">B</button>
            <button class="option-btn" onclick="record('C')" id="btn-C">C</button>
            <button class="option-btn" onclick="record('D')" id="btn-D">D</button>
            <button class="option-btn" onclick="record('E')" id="btn-E">E</button>
        </div>
        <div class="nav-controls">
            <button class="btn-prev action" id="prev-btn" onclick="navigate(-1)">Previous</button>
            <button class="btn-next action" id="next-btn" onclick="navigate(1)">Next</button>
        </div>
    </div>

    <div id="report-screen" class="hidden">
        <h2 id="rep-title">Results Report</h2>
        <div id="summary-info" style="text-align: center; margin-bottom: 15px; color: var(--gray); font-weight: bold;"></div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Q#</th>
                    <th>Selected Answer</th>
                    <th>Time Spent</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button class="btn-start action" style="margin-top:25px; background:var(--dark);" onclick="location.reload()">NEW SESSION</button>
    </div>
</div>

<script>
    let totalQs = 0, curIdx = 0, manualAnswers = [], timeLogs = [], globalSecs = 0, questionSecs = 0, gInterval, qInterval;

    function initTest() {
        const nameInput = document.getElementById('test-name').value;
        totalQs = parseInt(document.getElementById('num-qs').value) || 1;
        manualAnswers = Array(totalQs).fill("-");
        timeLogs = Array(totalQs).fill(0);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        gInterval = setInterval(() => {
            globalSecs++;
            let m = Math.floor(globalSecs/60).toString().padStart(2,'0'), s = (globalSecs%60).toString().padStart(2,'0');
            document.getElementById('g-clock').innerText = `${m}:${s}`;
        }, 1000);

        qInterval = setInterval(() => {
            questionSecs++;
            document.getElementById('q-clock').innerText = questionSecs;
        }, 1000);
        updateScreen();
    }

    function updateScreen() {
        document.getElementById('q-number').innerText = `Q${curIdx + 1}`;
        document.getElementById('prev-btn').disabled = (curIdx === 0);
        document.getElementById('next-btn').innerText = (curIdx === totalQs - 1) ? "FINISH" : "Next";
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        if(manualAnswers[curIdx] !== "-") document.getElementById(`btn-${manualAnswers[curIdx]}`).classList.add('selected');
    }

    function record(letter) { manualAnswers[curIdx] = letter; updateScreen(); }

    function navigate(step) {
        timeLogs[curIdx] += questionSecs;
        questionSecs = 0;
        document.getElementById('q-clock').innerText = "0";

        if(step === 1 && curIdx === totalQs - 1) {
            showFinalReport();
        } else {
            curIdx += step;
            updateScreen();
        }
    }

    function showFinalReport() {
        clearInterval(gInterval); 
        clearInterval(qInterval);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');
        
        const testName = document.getElementById('test-name').value || "Untitled Test";
        document.getElementById('rep-title').innerText = "Report: " + testName;
        document.getElementById('summary-info').innerText = `Total Duration: ${document.getElementById('g-clock').innerText}`;

        let tableHtml = "";
        manualAnswers.forEach((ans, i) => {
            tableHtml += `<tr>
                <td>${i+1}</td>
                <td style="font-weight: bold; color: var(--primary);">${ans}</td>
                <td>${timeLogs[i]}s</td>
                <td><span class="tag">RECORDED</span></td>
            </tr>`;
        });
        document.getElementById('report-body').innerHTML = tableHtml;
    }
</script>
</body>
