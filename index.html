<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Response Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --dark: #1e293b; --gray: #64748b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 600px; min-height: 400px; display: flex; flex-direction: column; }
        .hidden { display: none; }
        
        h2 { color: var(--dark); text-align: center; margin-top: 0; }
        label { font-weight: 600; color: var(--gray); display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        
        /* Timers */
        .timer-bar { display: flex; justify-content: space-between; background: var(--dark); color: white; padding: 12px 20px; border-radius: 10px; margin-bottom: 25px; font-family: monospace; font-size: 1.1rem; }
        .q-num { font-size: 3rem; font-weight: 800; text-align: center; color: var(--primary); margin: 20px 0; }

        /* Options */
        .options-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .option-btn { background: white; border: 2px solid #f1f5f9; padding: 20px 0; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary); }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* Nav */
        .nav-controls { display: flex; justify-content: space-between; margin-top: auto; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        button { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; font-size: 1rem; }
        .btn-prev { background: var(--gray); color: white; width: 45%; }
        .btn-next { background: var(--success); color: white; width: 45%; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Table */
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 12px; border: 1px solid #f1f5f9; text-align: center; }
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; }
        .match { background: #dcfce7; color: #166534; }
        .mismatch { background: #fee2e2; color: #991b1b; }
        
        .upload-zone { border: 2px dashed var(--primary); padding: 30px; border-radius: 12px; background: #eff6ff; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-screen">
        <h2>Test Setup</h2>
        <label>Test Name:</label>
        <input type="text" id="test-name" placeholder="e.g. Weekly Quiz">
        <label>Number of Questions:</label>
        <input type="number" id="num-qs" value="5" min="1" max="100">
        <button class="btn-main" onclick="initTracker()">START TRACKER</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="timer-bar">
            <span>Q: <b id="q-clock" style="color:#fbbf24">0</b>s</span>
            <span>Total: <b id="g-clock">00:00</b></span>
        </div>
        <div id="active-test-name" style="text-align:center; color:var(--gray); font-weight:bold;"></div>
        <div class="q-num" id="q-display">Q1</div>
        
        <div class="options-grid">
            <button class="option-btn" onclick="setAns('A')" id="btn-A">A</button>
            <button class="option-btn" onclick="setAns('B')" id="btn-B">B</button>
            <button class="option-btn" onclick="setAns('C')" id="btn-C">C</button>
            <button class="option-btn" onclick="setAns('D')" id="btn-D">D</button>
            <button class="option-btn" onclick="setAns('E')" id="btn-E">E</button>
        </div>

        <div class="nav-controls">
            <button class="btn-prev" id="prev-btn" onclick="changeQ(-1)">Previous</button>
            <button class="btn-next" id="next-btn" onclick="changeQ(1)">Next</button>
        </div>
    </div>

    <div id="verify-screen" class="hidden">
        <h2>Submit & Verify</h2>
        <p style="text-align:center; color:var(--gray);">All responses saved. Upload photo to check against AI.</p>
        <div class="upload-zone">
            <input type="file" id="file-input" accept="image/*">
            <button class="btn-main" style="margin-top:20px; background:var(--dark);" onclick="processAI()">RUN AI SCAN</button>
            <div id="ai-status" class="hidden" style="margin-top:15px; color:var(--primary); font-weight:bold;">Initializing AI...</div>
        </div>
    </div>

    <div id="report-screen" class="hidden">
        <h2 id="report-title">Final Report</h2>
        <div id="summary-text" style="margin-bottom:15px; font-weight:bold;"></div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Q#</th>
                    <th>Manual</th>
                    <th>AI Scan</th>
                    <th>Time</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button class="btn-main" style="margin-top:30px; background:var(--dark);" onclick="location.reload()">RESTART SESSION</button>
    </div>
</div>

<script>
    let testTitle = "", total = 0, cur = 0;
    let answers = [], times = [];
    let gSecs = 0, qSecs = 0;
    let gInt, qInt;

    function initTracker() {
        testTitle = document.getElementById('test-name').value || "Untitled Test";
        total = parseInt(document.getElementById('num-qs').value) || 1;
        answers = Array(total).fill("-");
        times = Array(total).fill(0);

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('active-test-name').innerText = testTitle;

        // Timers
        gInt = setInterval(() => {
            gSecs++;
            let m = Math.floor(gSecs/60).toString().padStart(2,'0');
            let s = (gSecs%60).toString().padStart(2,'0');
            document.getElementById('g-clock').innerText = `${m}:${s}`;
        }, 1000);

        qInt = setInterval(() => {
            qSecs++;
            document.getElementById('q-clock').innerText = qSecs;
        }, 1000);

        refreshUI();
    }

    function refreshUI() {
        document.getElementById('q-display').innerText = `Q${cur + 1}`;
        document.getElementById('prev-btn').disabled = (cur === 0);
        document.getElementById('next-btn').innerText = (cur === total - 1) ? "FINISH" : "Next";
        
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        if(answers[cur] !== "-") document.getElementById(`btn-${answers[cur]}`).classList.add('selected');
    }

    function setAns(l) { answers[cur] = l; refreshUI(); }

    function changeQ(dir) {
        times[cur] += qSecs;
        qSecs = 0; // Reset question stopwatch
        document.getElementById('q-clock').innerText = "0";

        if(dir === 1 && cur === total - 1) {
            finish();
        } else {
            cur += dir;
            refreshUI();
        }
    }

    function finish() {
        clearInterval(gInt); clearInterval(qInt);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('verify-screen').classList.remove('hidden');
    }

    async function processAI() {
        const file = document.getElementById('file-input').files[0];
        if(!file) return alert("Select a photo first!");
        
        const status = document.getElementById('ai-status');
        status.classList.remove('hidden');
        
        try {
            const worker = await Tesseract.createWorker('eng', 1, {
                logger: m => { if(m.status === 'recognizing text') status.innerText = `Analyzing: ${Math.round(m.progress*100)}%`; }
            });
            const { data: { text } } = await worker.recognize(file);
            const aiFound = text.toUpperCase().match(/[A-E]/g) || [];
            await worker.terminate();
            showReport(aiFound);
        } catch(e) {
            alert("AI Error. Showing manual results.");
            showReport([]);
        }
    }

    function showReport(aiArr) {
        document.getElementById('verify-screen').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');
        document.getElementById('report-title').innerText = "Report: " + testTitle;

        let rows = "", matches = 0;
        answers.forEach((ans, i) => {
            const aiAns = aiArr[i] || "-";
            const ok = (ans === aiAns && ans !== "-");
            if(ok) matches++;
            rows += `<tr>
                <td>${i+1}</td>
                <td>${ans}</td>
                <td>${aiAns}</td>
                <td>${times[i]}s</td>
                <td><span class="status ${ok?'match':'mismatch'}">${ok?'MATCH':'DIFF'}</span></td>
            </tr>`;
        });
        document.getElementById('report-body').innerHTML = rows;
        document.getElementById('summary-text').innerText = `AI Match Accuracy: ${matches}/${total}`;
    }
</script>
</body>
</html>
