<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Response Tracker</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --dark: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .hidden { display: none; }
        
        h2 { color: var(--dark); margin-bottom: 1.5rem; text-align: center; }
        label { font-weight: 600; color: #475569; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        button { padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        
        .timer-bar { display: flex; justify-content: space-between; background: var(--dark); color: white; padding: 12px 20px; border-radius: 10px; margin-bottom: 25px; font-family: monospace; }
        
        .q-display { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 30px; color: var(--primary); }
        
        .options-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .option-btn { background: white; border: 2px solid #f1f5f9; text-align: center; padding: 20px 0; border-radius: 10px; font-size: 1.2rem; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        .nav-controls { display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; padding-top: 25px; }
        .btn-nav { width: 48%; background: #64748b; color: white; }
        .btn-next { background: var(--success); }

        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 12px; border: 1px solid #f1f5f9; text-align: center; }
        .status-tag { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .match { background: #dcfce7; color: #166534; }
        .diff { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-screen">
        <h2>New Assessment</h2>
        
        <label>Test Identity:</label>
        <input type="text" id="test-title-input" placeholder="e.g. Blank Test 01">
        
        <label>Number of Questions:</label>
        <input type="number" id="num-input" value="10" min="1">
        
        <button class="btn-primary" onclick="startTest()">INITIALIZE TRACKER</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="timer-bar">
            <span>Q-Watch: <b id="q-clock" style="color:#fbbf24">0</b>s</span>
            <span>Total: <b id="g-clock">00:00</b></span>
        </div>
        
        <div id="test-header" style="text-align:center; color:#64748b; font-size:0.9rem; margin-bottom:5px;"></div>
        <div class="q-display" id="q-number-display">Q1</div>
        
        <p style="text-align:center; color:#94a3b8; margin-bottom:15px;">Select Response:</p>
        <div class="options-grid">
            <button class="option-btn" id="opt-A" onclick="pick('A')">A</button>
            <button class="option-btn" id="opt-B" onclick="pick('B')">B</button>
            <button class="option-btn" id="opt-C" onclick="pick('C')">C</button>
            <button class="option-btn" id="opt-D" onclick="pick('D')">D</button>
            <button class="option-btn" id="opt-E" onclick="pick('E')">E</button>
        </div>

        <div class="nav-controls">
            <button class="btn-nav" id="prev-btn" onclick="prev()">Previous</button>
            <button class="btn-nav btn-next" id="next-btn" onclick="next()">Next</button>
        </div>
    </div>

    <div id="verify-screen" class="hidden">
        <h2>Submit & Verify</h2>
        <p style="text-align:center; color:#64748b;">All responses recorded. Upload answer sheet to verify.</p>
        <div style="border: 2px dashed var(--primary); padding: 30px; border-radius: 12px; background: #eff6ff; text-align: center;">
            <input type="file" id="image-input" accept="image/*">
            <button class="btn-primary" onclick="runAI()" style="margin-top:20px; background: var(--dark);">COMPARE WITH AI SCAN</button>
            <div id="ai-loading" class="hidden" style="margin-top:15px; color: var(--primary); font-weight: bold;">AI processing handwriting...</div>
        </div>
    </div>

    <div id="report-screen" class="hidden">
        <h2 id="final-test-name">Test Report</h2>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Q#</th>
                    <th>Manual</th>
                    <th>AI Scan</th>
                    <th>Time Spent</th>
                    <th>Match</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button class="btn-primary" onclick="location.reload()" style="margin-top:25px; background: var(--dark);">Restart Session</button>
    </div>
</div>

<script>
    let testTitle = "", totalQs = 0;
    let userAnswers = [], timePerQ = [];
    let curIdx = 0, gSecs = 0, qSecs = 0;
    let gTimer, qTimer;

    function startTest() {
        testTitle = document.getElementById('test-title-input').value || "Untitled Session";
        totalQs = parseInt(document.getElementById('num-input').value) || 1;
        
        userAnswers = Array(totalQs).fill("-");
        timePerQ = Array(totalQs).fill(0);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('test-header').innerText = testTitle;
        
        gTimer = setInterval(() => {
            gSecs++;
            let m = Math.floor(gSecs/60).toString().padStart(2,'0');
            let s = (gSecs%60).toString().padStart(2,'0');
            document.getElementById('g-clock').innerText = `${m}:${s}`;
        }, 1000);

        qTimer = setInterval(() => {
            qSecs++;
            document.getElementById('q-clock').innerText = qSecs;
        }, 1000);

        updateUI();
    }

    function updateUI() {
        document.getElementById('q-number-display').innerText = `Q${curIdx + 1}`;
        document.getElementById('prev-btn').disabled = (curIdx === 0);
        document.getElementById('next-btn').innerText = (curIdx === totalQs - 1) ? "FINISH" : "Next";
        
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        if(userAnswers[curIdx] !== "-") {
            document.getElementById(`opt-${userAnswers[curIdx]}`).classList.add('selected');
        }
    }

    function pick(l) { 
        userAnswers[curIdx] = l; 
        updateUI(); 
    }

    function next() {
        timePerQ[curIdx] += qSecs;
        qSecs = 0;
        if (curIdx < totalQs - 1) { 
            curIdx++; 
            updateUI(); 
        } else { 
            clearInterval(gTimer); clearInterval(qTimer);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('verify-screen').classList.remove('hidden');
        }
    }

    function prev() {
        timePerQ[curIdx] += qSecs;
        qSecs = 0;
        if (curIdx > 0) { 
            curIdx--; 
            updateUI(); 
        }
    }

    async function runAI() {
        const file = document.getElementById('image-input').files[0];
        if (!file) return alert("Select photo first.");
        document.getElementById('ai-loading').classList.remove('hidden');

        Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
            const aiFound = text.match(/[A-E]/g) || [];
            document.getElementById('verify-screen').classList.add('hidden');
            document.getElementById('report-screen').classList.remove('hidden');
            document.getElementById('final-test-name').innerText = "Results: " + testTitle;

            let rows = "";
            userAnswers.forEach((ans, i) => {
                let aiAns = aiFound[i] || "-";
                let match = (ans === aiAns && ans !== "-");
                rows += `<tr>
                    <td>${i+1}</td>
                    <td><b>${ans}</b></td>
                    <td>${aiAns}</td>
                    <td>${timePerQ[i]}s</td>
                    <td><span class="status-tag ${match ? 'match' : 'diff'}">${match ? 'MATCH' : 'DIFF'}</span></td>
                </tr>`;
            });
            document.getElementById('report-body').innerHTML = rows;
        });
    }
</script>

</body>
</html>
