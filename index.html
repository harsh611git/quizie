<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Response Tracker</title>
    <style>
        :root {
            /* Light Mode Variables */
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --option-bg: #f1f5f9;
            --option-hover: #e2e8f0;
            --primary: #2563eb;
            --success: #16a34a;
            --dark: #1e293b;
        }

        [data-theme="dark"] {
            /* Pitch Black Dark Mode Variables */
            --bg: #000000;
            --card-bg: #000000;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #262626;
            --option-bg: #171717;
            --option-hover: #262626;
            --primary: #3b82f6;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }

        .card { 
            background: var(--card-bg); 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 600px; 
            min-height: 480px; 
            display: flex; 
            flex-direction: column;
            position: relative;
            transition: background 0.3s;
        }

        [data-theme="dark"] .card {
            box-shadow: 0 0 0 1px var(--border); /* Clean border accent for pitch black layout */
        }

        .hidden { display: none !important; }
        
        /* Theme Toggle Switch */
        .theme-switch-wrapper {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: 0.4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }
        .theme-label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }

        h2 { color: var(--text-main); text-align: center; margin-top: 0; }
        label { font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 8px; }
        
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border); 
            background: var(--card-bg);
            color: var(--text-main);
            border-radius: 10px; 
            font-size: 1rem; 
            box-sizing: border-box; 
        }
        
        .timer-bar { 
            display: flex; 
            justify-content: space-between; 
            background: #171717; 
            color: white; 
            padding: 14px 20px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            font-family: monospace; 
            font-size: 1.1rem; 
        }
        [data-theme="dark"] .timer-bar {
            border: 1px solid var(--border);
        }
        .q-display { font-size: 2.2rem; font-weight: 800; text-align: center; color: var(--primary); margin: 15px 0; }

        /* Full Width Stacked Option Layout */
        .options-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 40px; 
        }
        .option-row { 
            background: var(--option-bg); 
            border: 1px solid var(--border); 
            padding: 18px 24px; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            font-weight: 600; 
            cursor: pointer; 
            text-align: left;
            color: var(--text-main);
            transition: all 0.2s; 
            width: 100%;
            box-sizing: border-box;
        }
        .option-row:hover { 
            background: var(--option-hover); 
        }
        .option-row.selected { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }

        /* Navigation Buttons */
        .nav-controls { display: flex; justify-content: space-between; margin-top: auto; padding-top: 25px; border-top: 2px solid var(--border); }
        button.action { padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 45%; font-size: 1rem; }
        .btn-start { background: var(--primary); color: white; width: 100% !important; }
        .btn-prev { background: #e2e8f0; color: #475569; }
        [data-theme="dark"] .btn-prev { background: #171717; color: #cbd5e1; border: 1px solid var(--border); }
        .btn-next { background: var(--success); color: white; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Report Table Styling */
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: var(--text-main); }
        .report-table th, .report-table td { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; }
        .report-table th { color: var(--text-muted); }
        .tag { font-weight: bold; padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; background: var(--option-bg); color: var(--text-muted); }
    </style>
</head>
<body data-theme="light">

<div class="card">
    <div class="theme-switch-wrapper">
        <span class="theme-label">Dark Mode</span>
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" onclick="toggleTheme()">
            <div class="slider"></div>
        </label>
    </div>

    <div id="setup-screen">
        <h2>Assessment Portal</h2>
        <label>Test Identity:</label>
        <input type="text" id="test-name" placeholder="e.g. Zoology Quiz">
        <label>Number of Questions:</label>
        <input type="number" id="num-qs" value="5">
        <button class="btn-start action" onclick="initTest()">INITIALIZE TEST</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="timer-bar">
            <span>Q: <b id="q-clock" style="color:#fbbf24">00:00</b></span>
            <span>Total: <b id="g-clock">00:00</b></span>
        </div>
        <div class="q-display" id="q-number">Question 1</div>
        
        <div class="options-container">
            <button class="option-row" onclick="record('A')" id="btn-A">A</button>
            <button class="option-row" onclick="record('B')" id="btn-B">B</button>
            <button class="option-row" onclick="record('C')" id="btn-C">C</button>
            <button class="option-row" onclick="record('D')" id="btn-D">D</button>
            <button class="option-row" onclick="record('E')" id="btn-E">E</button>
        </div>
        
        <div class="nav-controls">
            <button class="btn-prev action" id="prev-btn" onclick="navigate(-1)">Previous</button>
            <button class="btn-next action" id="next-btn" onclick="navigate(1)">Next</button>
        </div>
    </div>

    <div id="report-screen" class="hidden">
        <h2 id="rep-title">Results Report</h2>
        <div id="summary-info" style="text-align: center; margin-bottom: 15px; color: var(--text-muted); font-weight: bold;"></div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Q#</th>
                    <th>Selected Answer</th>
                    <th>Time Spent</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button class="btn-start action" style="margin-top:25px; background:var(--dark); color: white;" onclick="location.reload()">NEW SESSION</button>
    </div>
</div>

<script>
    let totalQs = 0, curIdx = 0, manualAnswers = [], timeLogs = [], globalSecs = 0, questionSecs = 0, gInterval, qInterval;

    function toggleTheme() {
        const currentTheme = document.body.getAttribute('data-theme');
        const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', targetTheme);
    }

    function formatTimeDisplay(totalSeconds) {
        let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        let s = (totalSeconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function formatLogText(totalSeconds) {
        if (totalSeconds < 60) return `${totalSeconds}s`;
        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;
        return s === 0 ? `${m}m` : `${m}m ${s}s`;
    }

    function initTest() {
        totalQs = parseInt(document.getElementById('num-qs').value) || 1;
        manualAnswers = Array(totalQs).fill("-");
        timeLogs = Array(totalQs).fill(0);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        gInterval = setInterval(() => {
            globalSecs++;
            document.getElementById('g-clock').innerText = formatTimeDisplay(globalSecs);
        }, 1000);

        qInterval = setInterval(() => {
            questionSecs++;
            document.getElementById('q-clock').innerText = formatTimeDisplay(questionSecs);
        }, 1000);
        updateScreen();
    }

    function updateScreen() {
        document.getElementById('q-number').innerText = `Question ${curIdx + 1}`;
        document.getElementById('prev-btn').disabled = (curIdx === 0);
        document.getElementById('next-btn').innerText = (curIdx === totalQs - 1) ? "FINISH" : "Next";
        document.querySelectorAll('.option-row').forEach(b => b.classList.remove('selected'));
        if(manualAnswers[curIdx] !== "-") document.getElementById(`btn-${manualAnswers[curIdx]}`).classList.add('selected');
    }

    function record(letter) { manualAnswers[curIdx] = letter; updateScreen(); }

    function navigate(step) {
        timeLogs[curIdx] += questionSecs;
        questionSecs = 0;
        document.getElementById('q-clock').innerText = "00:00";

        if(step === 1 && curIdx === totalQs - 1) {
            showFinalReport();
        } else {
            curIdx += step;
            updateScreen();
        }
    }

    function showFinalReport() {
        clearInterval(gInterval); 
        clearInterval(qInterval);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');
        
        const testName = document.getElementById('test-name').value || "Untitled Test";
        document.getElementById('rep-title').innerText = "Report: " + testName;
        document.getElementById('summary-info').innerText = `Total Duration: ${formatTimeDisplay(globalSecs)}`;

        let tableHtml = "";
        manualAnswers.forEach((ans, i) => {
            tableHtml += `<tr>
                <td>${i+1}</td>
                <td style="font-weight: bold; color: var(--primary);">${ans}</td>
                <td>${formatLogText(timeLogs[i])}</td>
                <td><span class="tag">RECORDED</span></td>
            </tr>`;
        });
        document.getElementById('report-body').innerHTML = tableHtml;
    }
</script>
</body>
</html>
