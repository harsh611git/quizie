<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Assessment System</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --dark: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        .hidden { display: none; }
        
        h2 { color: var(--dark); margin-bottom: 1rem; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0 16px 0; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        
        /* Buttons */
        button { padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background: #1d4ed8; }
        
        /* Quiz Interface */
        .timer-bar { display: flex; justify-content: space-between; background: var(--dark); color: white; padding: 12px 20px; border-radius: 10px; margin-bottom: 25px; font-family: 'Courier New', monospace; }
        .q-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: var(--dark); }
        .options-grid { display: grid; gap: 12px; margin-bottom: 25px; }
        .option-btn { background: white; border: 2px solid #f1f5f9; text-align: left; padding: 16px; border-radius: 10px; transition: 0.3s; color: var(--dark); }
        .option-btn:hover { border-color: var(--primary); background: #eff6ff; }
        .option-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        .nav-controls { display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; padding-top: 25px; }
        .btn-nav { width: 48%; background: #64748b; color: white; }
        .btn-next { background: var(--success); }

        /* Report Table */
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; }
        .report-table th { background: #f1f5f9; color: #475569; padding: 12px; }
        .report-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .match-status { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-yes { background: #dcfce7; color: #166534; }
        .status-no { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-screen">
        <h2>Quiz Portal</h2>
        <label><b>Full Name / Username:</b></label>
        <input type="text" id="user-display-name" placeholder="Enter your name">
        
        <label><b>Test Title:</b></label>
        <input type="text" id="test-title-input" placeholder="e.g. Science Quiz #1">
        
        <button class="btn-primary" onclick="startTest()">LOG IN & START TEST</button>
        <p style="text-align:center; font-size: 12px; color: #94a3b8; margin-top:15px;">Note: Any name creates a new session.</p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="timer-bar">
            <span>Q-Watch: <b id="q-clock" style="color:#fbbf24">0</b>s</span>
            <span>Total: <b id="g-clock">00:00</b></span>
        </div>
        <div id="test-header" style="color: var(--primary); font-weight: bold; margin-bottom: 5px;"></div>
        <div id="progress-text" style="color: #64748b; font-size: 14px; margin-bottom: 10px;"></div>
        
        <div class="q-text" id="question-body">Loading...</div>
        
        <div class="options-grid">
            <button class="option-btn" id="opt-A" onclick="pick('A')"><b>A:</b> <span id="text-A"></span></button>
            <button class="option-btn" id="opt-B" onclick="pick('B')"><b>B:</b> <span id="text-B"></span></button>
            <button class="option-btn" id="opt-C" onclick="pick('C')"><b>C:</b> <span id="text-C"></span></button>
            <button class="option-btn" id="opt-D" onclick="pick('D')"><b>D:</b> <span id="text-D"></span></button>
            <button class="option-btn" id="opt-E" onclick="pick('E')"><b>E:</b> <span id="text-E"></span></button>
        </div>

        <div class="nav-controls">
            <button class="btn-nav" id="prev-btn" onclick="prev()">Previous</button>
            <button class="btn-nav btn-next" id="next-btn" onclick="next()">Next</button>
        </div>
    </div>

    <div id="verify-screen" class="hidden">
        <h2>Submit & Verify</h2>
        <p>Please upload your answer sheet to unlock the final report.</p>
        <div style="border: 2px dashed var(--primary); padding: 30px; border-radius: 12px; background: #eff6ff; text-align: center;">
            <input type="file" id="image-input" accept="image/*">
            <button class="btn-primary" onclick="runAI()" style="margin-top:20px; background: var(--dark);">RUN AI VERIFICATION</button>
            <div id="ai-loading" class="hidden" style="margin-top:15px; color: var(--primary); font-weight: bold;">AI is reading handwriting...</div>
        </div>
    </div>

    <div id="report-screen" class="hidden">
        <h2 id="final-test-name">Report</h2>
        <div id="final-user-details" style="font-weight: bold; color: #475569; margin-bottom: 20px;"></div>
        
        <table class="report-table">
            <thead>
                <tr>
                    <th>Q#</th>
                    <th>Manual</th>
                    <th>AI Scan</th>
                    <th>Time</th>
                    <th>Match</th>
                </tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        
        <button class="btn-primary" onclick="location.reload()" style="margin-top:30px; background: var(--dark);">Close & Logout</button>
    </div>
</div>

<script>
    // --- CONFIGURE YOUR QUESTIONS HERE ---
    const myQuestions = [
        { q: "What is the capital of France?", a: "Paris", b: "London", c: "Berlin", d: "Rome", e: "Madrid" },
        { q: "Which planet is known as the Red Planet?", a: "Venus", b: "Jupiter", c: "Mars", d: "Saturn", e: "Mercury" },
        { q: "What is 5 + 7?", a: "10", b: "11", c: "12", d: "13", e: "14" },
        { q: "Who wrote 'Romeo and Juliet'?", a: "Shakespeare", b: "Dickens", c: "Hemingway", d: "Twain", e: "Austen" },
        { q: "Which gas do plants absorb?", a: "Oxygen", b: "Nitrogen", c: "Carbon Dioxide", d: "Helium", e: "Hydrogen" }
    ];

    let userName = "", testTitle = "";
    let userAnswers = [], timePerQ = [];
    let curIdx = 0, gSecs = 0, qSecs = 0;
    let gTimer, qTimer;

    function startTest() {
        userName = document.getElementById('user-display-name').value || "Anonymous";
        testTitle = document.getElementById('test-title-input').value || "Standard Test";
        
        userAnswers = Array(myQuestions.length).fill("-");
        timePerQ = Array(myQuestions.length).fill(0);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('test-header').innerText = testTitle;
        
        gTimer = setInterval(() => {
            gSecs++;
            let m = Math.floor(gSecs/60).toString().padStart(2,'0');
            let s = (gSecs%60).toString().padStart(2,'0');
            document.getElementById('g-clock').innerText = `${m}:${s}`;
        }, 1000);

        qTimer = setInterval(() => {
            qSecs++;
            document.getElementById('q-clock').innerText = qSecs;
        }, 1000);

        loadQ();
    }

    function loadQ() {
        let qData = myQuestions[curIdx];
        document.getElementById('progress-text').innerText = `Question ${curIdx + 1} of ${myQuestions.length}`;
        document.getElementById('question-body').innerText = qData.q;
        document.getElementById('text-A').innerText = qData.a;
        document.getElementById('text-B').innerText = qData.b;
        document.getElementById('text-C').innerText = qData.c;
        document.getElementById('text-D').innerText = qData.d;
        document.getElementById('text-E').innerText = qData.e;
        
        document.getElementById('prev-btn').disabled = (curIdx === 0);
        document.getElementById('next-btn').innerText = (curIdx === myQuestions.length - 1) ? "FINISH" : "Next";
        
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        if(userAnswers[curIdx] !== "-") document.getElementById(`opt-${userAnswers[curIdx]}`).classList.add('selected');
    }

    function pick(letter) {
        userAnswers[curIdx] = letter;
        loadQ();
    }

    function next() {
        timePerQ[curIdx] += qSecs;
        qSecs = 0; // RESET STOPWATCH
        if (curIdx < myQuestions.length - 1) { curIdx++; loadQ(); } 
        else { endQuiz(); }
    }

    function prev() {
        timePerQ[curIdx] += qSecs;
        qSecs = 0; // RESET STOPWATCH
        if (curIdx > 0) { curIdx--; loadQ(); }
    }

    function endQuiz() {
        clearInterval(gTimer); clearInterval(qTimer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('verify-screen').classList.remove('hidden');
    }

    async function runAI() {
        const file = document.getElementById('image-input').files[0];
        if (!file) return alert("Please upload a photo first!");
        document.getElementById('ai-loading').classList.remove('hidden');

        Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
            const aiResults = text.match(/[A-E]/g) || [];
            showFinalReport(aiResults);
        });
    }

    function showFinalReport(aiArr) {
        document.getElementById('verify-screen').classList.add('hidden');
        document.getElementById('report-screen').classList.remove('hidden');
        document.getElementById('final-test-name').innerText = "Report: " + testTitle;
        document.getElementById('final-user-details').innerText = "Student Name: " + userName;

        let rows = "";
        userAnswers.forEach((ans, i) => {
            let aiAns = aiArr[i] || "-";
            let match = (ans === aiAns && ans !== "-");
            rows += `<tr>
                <td>${i+1}</td>
                <td>${ans}</td>
                <td>${aiAns}</td>
                <td>${timePerQ[i]}s</td>
                <td><span class="match-status ${match ? 'status-yes' : 'status-no'}">${match ? 'YES' : 'NO'}</span></td>
            </tr>`;
        });
        document.getElementById('report-body').innerHTML = rows;
    }
</script>

</body>
</html>
